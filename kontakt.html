<head>

    <link class="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">RODAK ARCHITEKCI</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Start</a></li>
                    <li class="nav-item"><a class="nav-link" href="o-nas.html">O nas</a></li>

                    <li class="nav-item active"><a class="nav-link" href="kontakt.html">Kontakt</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="text-center mb-5 font-weight-bold">Skontaktuj się z nami</h2>
        <div class="row">

            <div class="col-md-6 mb-4">
                <h4 class="font-weight-bold">Rodak Architekci</h4>
                <p class="text-muted">Radom, Polska</p>
                <p><strong>Telefon:</strong> +48 XXX XXX XXX</p>
                <p><strong>E-mail:</strong> biuro@rodakarchitekci.pl</p>
                <p><strong>Godziny otwarcia:</strong> Pon - Pt: 8:00 - 16:00</p>
            </div>

            <div class="col-md-6">
                <form>
                    <div class="form-group">
                        <label for="name">Imię i nazwisko</label>
                        <input type="text" class="form-control" id="name" placeholder="Jan Kowalski" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Adres e-mail</label>
                        <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Wiadomość</label>
                        <textarea class="form-control" id="message" rows="4" placeholder="W czym możemy pomóc?" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-dark btn-block">Wyślij wiadomość</button>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer py-4 text-center fixed-bottom">
        <div class="container"><p class="mb-0">&copy; 2026 Rodak Architekci Radom.</p></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
